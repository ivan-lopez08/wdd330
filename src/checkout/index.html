<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
  <section class="checkout">
    <h2>Review &amp; Place your Order</h2>

    <form id="checkout-form" class="checkout-form">
      <fieldset>
        <legend>Customer Information</legend>

        <label for="fname">First Name</label>
        <input
          id="fname"
          name="fname"
          type="text"
          required
          autocomplete="given-name"
        />

        <label for="lname">Last Name</label>
        <input
          id="lname"
          name="lname"
          type="text"
          required
          autocomplete="family-name"
        />

        <label for="street">Street Address</label>
        <input
          id="street"
          name="street"
          type="text"
          required
          autocomplete="street-address"
        />

        <label for="city">City</label>
        <input
          id="city"
          name="city"
          type="text"
          required
          autocomplete="address-level2"
        />

        <label for="state">State</label>
        <input
          id="state"
          name="state"
          type="text"
          required
          autocomplete="address-level1"
        />

        <label for="zip">Zip Code</label>
        <input
          id="zip"
          name="zip"
          type="text"
          required
          autocomplete="postal-code"
        />
      </fieldset>

      <fieldset>
        <legend>Payment</legend>

        <label for="cardNumber">Credit Card Number</label>
        <input
          id="cardNumber"
          name="cardNumber"
          type="text"
          required
          inputmode="numeric"
          autocomplete="cc-number"
        />

        <label for="expiration">Expiration Date</label>
        <input
          id="expiration"
          name="expiration"
          type="text"
          placeholder="MM/YY"
          required
          autocomplete="cc-exp"
        />

        <label for="code">Security Code</label>
        <input
          id="code"
          name="code"
          type="text"
          required
          inputmode="numeric"
          autocomplete="cc-csc"
        />
      </fieldset>

      <button type="submit" class="checkout-submit">Checkout</button>
    </form>

    <aside class="order-summary">
      <h3>Order Summary</h3>
      <p><span>Subtotal</span><span>$<span id="subtotal">0.00</span></span></p>
      <p><span>Tax</span><span>$<span id="tax">0.00</span></span></p>
      <p><span>Shipping</span><span>$<span id="shipping">0.00</span></span></p>
      <h4><span>Order Total</span><span>$<span id="orderTotal">0.00</span></span></h4>
    </aside>
  </section>
</main>

    <footer id="main-footer"></footer>
  </body>
</html>
